<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拍記 PaiJi — 手寫筆記，拍一下就變數位</title>
<style>
  :root{
    --bg:#FFFFFF; --sunken:#F4F5F7; --ink:#17181C; --muted:#565A66; --faint:#9AA0AC;
    --line:#E8EAEE; --hl-yellow:#FFE94A; --hl-pink:#FFB8D4; --hl-green:#C4F27D; --dot:#DCE0E6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);
    background-image:radial-gradient(var(--dot) 1.1px, transparent 1.1px);
    background-size:22px 22px;
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",Roboto,sans-serif;
    line-height:1.8;
    display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;
  }
  .card{background:var(--bg);border:2.5px solid var(--ink);border-radius:18px;max-width:420px;width:100%;
    padding:36px 28px;text-align:center;box-shadow:6px 6px 0 var(--hl-yellow)}
  h1{font-size:26px;margin:14px 0 4px}
  h1 mark{background:linear-gradient(transparent 55%, var(--hl-yellow) 55%);color:inherit;padding:0 2px}
  .tag{color:var(--muted);font-size:14.5px;margin-bottom:22px}
  nav a{display:block;border:2px solid var(--line);border-radius:12px;padding:12px;margin:10px 0;
    text-decoration:none;color:var(--ink);font-weight:700;font-size:15px}
  nav a:hover{border-color:var(--ink);background:var(--sunken)}
  footer{margin-top:20px;color:var(--faint);font-size:12.5px}
  footer a{color:inherit}
</style>
</head>
<body>
  <div class="card">
    <svg width="64" height="64" viewBox="0 0 40 40" role="img" aria-label="拍記 PaiJi">
      <rect x="1.5" y="1.5" width="37" height="37" rx="9" fill="#FFFDF5" stroke="#17181C" stroke-width="2.5"/>
      <path d="M8 14 h18" stroke="#FFE94A" stroke-width="5" stroke-linecap="round"/>
      <path d="M8 21 h24" stroke="#FFB8D4" stroke-width="5" stroke-linecap="round"/>
      <path d="M8 28 h14" stroke="#C4F27D" stroke-width="5" stroke-linecap="round"/>
    </svg>
    <h1><mark>拍記 PaiJi</mark></h1>
    <p class="tag">手寫筆記，拍一下就變數位。<br>Snap your handwritten notes into clean digital ones.</p>
    <nav>
      <a href="support.html">支援與常見問題 · Support</a>
      <a href="privacy.html">隱私權政策 · Privacy Policy</a>
      <a href="terms.html">服務條款 · Terms of Service</a>
    </nav>
    <footer>
      <p>開發者 Lin Jing-Hung（林靖閎） · <a href="mailto:loopapp18@gmail.com">loopapp18@gmail.com</a></p>
    </footer>
  </div>
</body>
</html>
